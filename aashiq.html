<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aashiq Cyber Editor</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* MAIN BOX */

.main-box{

    width:1536px;
    height:1536px;

    background:
    linear-gradient(
    to bottom,
    #0c6417 0%,
    #0c6417 62%,
    #d60000 62%,
    #d60000 100%);

    border:18px solid #ff1a1a;

    overflow:hidden;

    position:relative;
}

/* IMAGE AREA */

.frames{

    display:flex;

    justify-content:space-between;

    gap:40px;

    padding:40px;
}

.frame{

    width:48%;

    height:950px;

    background:#000;

    border-radius:60px;

    overflow:hidden;

    border:6px solid #222;

    position:relative;

    box-shadow:
    0 0 20px #fff,
    0 0 40px #fff,
    0 0 60px #fff;
}

.frame img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* MIDDLE LOGO */

.middle-logo{

    position:absolute;

    left:50%;

    top:57%;

    transform:translate(-50%,-50%);

    width:180px;
    height:180px;

    border-radius:50%;

    overflow:hidden;

    border:8px solid #fff;

    z-index:100;

    box-shadow:
    0 0 20px rgba(0,0,0,0.6);
}

.middle-logo img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* TEXT */

.bottom-text{

    text-align:center;

    color:#fff;

    font-size:62px;

    font-weight:bold;

    line-height:1.4;

    margin-top:110px;

    text-shadow:
    0 0 8px #000,
    0 0 15px #000;

    padding:0 40px;
}

/* CREDIT */

.credit{

    text-align:center;

    margin-top:25px;
}

.credit a{

    color:#fff;

    text-decoration:none;

    font-size:38px;

    font-weight:bold;

    text-shadow:
    0 0 5px #000,
    0 0 10px #000;
}

.credit a:hover{

    color:#00ff73;
}

/* CONTROL PANEL */

.control-panel{

    position:fixed;

    right:20px;
    top:20px;

    width:340px;

    background:#1a1a1a;

    border-radius:20px;

    padding:20px;

    z-index:999;

    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.control-panel h2{

    color:#fff;

    text-align:center;

    margin-bottom:20px;

    font-size:30px;
}

.control-panel input,
.control-panel textarea,
.control-panel select,
.control-panel button{

    width:100%;

    margin-bottom:15px;

    padding:15px;

    border:none;

    border-radius:12px;

    font-size:18px;
}

.control-panel textarea{

    height:120px;

    resize:none;
}

.control-panel button{

    background:#00b140;

    color:#fff;

    font-weight:bold;

    cursor:pointer;
}

.control-panel input[type="range"]{

    padding:0;
}

/* MOBILE */

@media(max-width:900px){

body{
    padding:0;
}

.main-box{

    width:100vw;
    height:100vw;
}

.frames{

    gap:15px;

    padding:15px;
}

.frame{

    height:58vw;

    border-radius:25px;
}

.middle-logo{

    width:90px;
    height:90px;
}

.bottom-text{

    font-size:24px;

    margin-top:40px;
}

.credit a{

    font-size:18px;
}

.control-panel{

    width:100%;

    right:0;

    top:auto;

    bottom:0;

    border-radius:20px 20px 0 0;
}

}

</style>
</head>

<body>

<!-- CONTROL PANEL -->

<div class="control-panel">

    <h2>Aashiq Cyber</h2>

    <!-- IMAGE UPLOAD -->

    <input
    type="file"
    id="img1"
    accept="image/*">

    <input
    type="file"
    id="img2"
    accept="image/*">

    <!-- CAPTION -->

    <textarea
    id="caption"
    placeholder="নিচের ক্যাপশন পরিবর্তন করুন">
    </textarea>

    <button onclick="changeCaption()">

        Change Caption

    </button>

    <!-- BACKGROUND -->

    <select id="bgStyle">

        <option value="greenred">
            Green + Red
        </option>

        <option value="blackred">
            Black + Red
        </option>

        <option value="bluepurple">
            Blue + Purple
        </option>

        <option value="orangeblack">
            Orange + Black
        </option>

        <option value="pinkpurple">
            Pink + Purple
        </option>

        <option value="goldblack">
            Gold + Black
        </option>

    </select>

    <button onclick="changeBackground()">

        Change Background

    </button>

    <!-- LOGO SIZE -->

    <input
    type="range"
    id="logoSize"
    min="80"
    max="400"
    value="180">

    <button onclick="changeLogoSize()">

        Logo Size Change

    </button>

</div>

<!-- MAIN BOX -->

<div class="main-box">

    <!-- IMAGE AREA -->

    <div class="frames">

        <!-- LEFT IMAGE -->

        <div class="frame">

            <img
            id="preview1"
            src="https://via.placeholder.com/700x1200">

        </div>

        <!-- RIGHT IMAGE -->

        <div class="frame">

            <img
            id="preview2"
            src="https://via.placeholder.com/700x1200">

        </div>

    </div>

    <!-- MIDDLE LOGO -->

    <div class="middle-logo">

        <img
        id="logoPreview"
        src="1000109471.jpg">

    </div>

    <!-- TEXT -->

    <div
    class="bottom-text"
    id="mainCaption">

        অশ্লীলতা ছড়ানোর দায়ে আরও<br>
        একটি পেজ পুরোপুরি রিমুভ করা হল

    </div>

    <!-- CREDIT -->

    <div class="credit">

        <a
        href="https://www.facebook.com/share/1CoirCye5P/"
        target="_blank">

            By Habibur Rahman

        </a>

    </div>

</div>

<script>

/* IMAGE 1 */

document
.getElementById("img1")
.addEventListener("change",function(e){

    const file =
    e.target.files[0];

    if(file){

        document
        .getElementById("preview1")
        .src =
        URL.createObjectURL(file);
    }

});

/* IMAGE 2 */

document
.getElementById("img2")
.addEventListener("change",function(e){

    const file =
    e.target.files[0];

    if(file){

        document
        .getElementById("preview2")
        .src =
        URL.createObjectURL(file);
    }

});

/* CHANGE CAPTION */

function changeCaption(){

    const text =
    document
    .getElementById("caption")
    .value;

    document
    .getElementById("mainCaption")
    .innerHTML =
    text.replace(/\n/g,"<br>");
}

/* CHANGE BACKGROUND */

function changeBackground(){

    const style =
    document
    .getElementById("bgStyle")
    .value;

    const box =
    document
    .querySelector(".main-box");

    if(style === "greenred"){

        box.style.background =
        "linear-gradient(to bottom,#0c6417 0%,#0c6417 62%,#d60000 62%,#d60000 100%)";
    }

    else if(style === "blackred"){

        box.style.background =
        "linear-gradient(to bottom,#111 0%,#111 62%,#d60000 62%,#d60000 100%)";
    }

    else if(style === "bluepurple"){

        box.style.background =
        "linear-gradient(to bottom,#0047ff 0%,#0047ff 62%,#7a00ff 62%,#7a00ff 100%)";
    }

    else if(style === "orangeblack"){

        box.style.background =
        "linear-gradient(to bottom,#ff7300 0%,#ff7300 62%,#111 62%,#111 100%)";
    }

    else if(style === "pinkpurple"){

        box.style.background =
        "linear-gradient(to bottom,#ff008c 0%,#ff008c 62%,#7b00ff 62%,#7b00ff 100%)";
    }

    else if(style === "goldblack"){

        box.style.background =
        "linear-gradient(to bottom,#ffb300 0%,#ffb300 62%,#111 62%,#111 100%)";
    }

}

/* LOGO SIZE */

function changeLogoSize(){

    const size =
    document
    .getElementById("logoSize")
    .value;

    const logo =
    document
    .querySelector(".middle-logo");

    logo.style.width =
    size + "px";

    logo.style.height =
    size + "px";
}

</script>

</body>
</html>
